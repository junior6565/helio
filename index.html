<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>helio — trouve ta terrasse au soleil</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='none' stroke='%23E8940A' stroke-width='6'/><circle cx='50' cy='50' r='32' fill='none' stroke='%23E8940A' stroke-width='6'/><circle cx='50' cy='50' r='14' fill='%23E8940A'/></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="helio">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="theme-color" content="#D4500A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', -apple-system, sans-serif; }
      body { overflow: hidden; background: #0f172a; }
      #root { width: 100vw; height: 100dvh; }
      input[type="range"] {
        -webkit-appearance: none;
        height: 3px;
        border-radius: 2px;
        background: #3D1F0A;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #F4A460;
        cursor: pointer;
        border: 3px solid #F5E6C8;
        box-shadow: 0 0 0 2px #D4500A;
      }
      /* Leaflet : garde ses z-index internes dans son propre contexte */
      .leaflet-container { isolation: isolate; }
      .leaflet-control-container { z-index: 900 !important; }
      .pills-scroll::-webkit-scrollbar { display: none; }
      .leaflet-control-zoom a {
        background: #1C0F06 !important;
        color: #F4A460 !important;
        border: 1.5px solid #3D1F0A !important;
        border-radius: 4px !important;
        font-family: 'Bebas Neue', sans-serif !important;
        box-shadow: 2px 2px 0px #D4500A !important;
      }
      .leaflet-control-zoom a:hover {
        background: #241208 !important;
      }
      .leaflet-control-attribution {
        font-size: 8px !important;
        opacity: 0.35 !important;
        max-width: 120px !important;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        background: rgba(28,15,6,0.5) !important;
        color: #5C3A22 !important;
        padding: 2px 6px !important;
      }
      .leaflet-control-attribution a { color: #D4500A !important; }
      .topbar::before {
        content: '';
        position: absolute; inset: 0; pointer-events: none;
        background: repeating-linear-gradient(
          45deg, transparent, transparent 8px,
          rgba(0,0,0,0.06) 8px, rgba(0,0,0,0.06) 9px
        );
      }
      .topbar::after {
        content: '';
        position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg, #8B3A07, #F4A460, #F5E6C8, #F4A460, #8B3A07);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
